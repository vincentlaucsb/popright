<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Popright Metallica Demo</title>
    <link rel="stylesheet" href="../../packages/core/src/styles/popright.css">
    <style>
      :root {
        --demo-bg: #f3f1ec;
        --demo-panel: #fffdf8;
        --demo-text: #181512;
        --demo-muted: #6f6760;
        --demo-border: #d6cfc4;
        --demo-row-border: #ebe4d8;
        --demo-focus: #b91c1c;
        --demo-accent: #b91c1c;
        --demo-gold: #b7791f;
        --demo-steel: #4b5563;
      }

      [data-theme="dark"] {
        --demo-bg: #121212;
        --demo-panel: #1c1c1c;
        --demo-text: #f3f4f6;
        --demo-muted: #a8a29e;
        --demo-border: #3f3f3f;
        --demo-row-border: #2b2b2b;
        --demo-focus: #f87171;
        --demo-accent: #ef4444;
        --demo-gold: #fbbf24;
        --demo-steel: #9ca3af;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--demo-text);
        background:
          linear-gradient(135deg, rgb(185 28 28 / 0.10), transparent 28rem),
          linear-gradient(315deg, rgb(183 121 31 / 0.12), transparent 24rem),
          var(--demo-bg);
        font: 14px/1.5 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        max-width: 980px;
        margin: 0 auto;
        padding: 32px 20px;
      }

      h1 {
        margin: 0;
        font-size: 28px;
        letter-spacing: 0;
      }

      .toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 18px;
      }

      .eyebrow {
        margin: 4px 0 0;
        color: var(--demo-muted);
      }

      .theme-toggle {
        display: inline-grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 2px;
        padding: 2px;
        color: var(--demo-text);
        background: var(--demo-panel);
        border: 1px solid var(--demo-border);
        border-radius: 8px;
      }

      .theme-toggle button {
        min-width: 54px;
        height: 28px;
        padding: 0 10px;
        color: inherit;
        background: transparent;
        border: 0;
        border-radius: 5px;
        font: inherit;
      }

      .theme-toggle button[aria-pressed="true"] {
        color: var(--popright-color);
        background: var(--popright-active-bg);
      }

      .album-list {
        border: 1px solid var(--demo-border);
        border-radius: 8px;
        overflow: hidden;
        background: var(--demo-panel);
        box-shadow: 0 18px 42px rgb(0 0 0 / 0.10);
      }

      .album-row {
        display: grid;
        grid-template-columns: 46px minmax(0, 1fr) auto;
        align-items: center;
        gap: 14px;
        padding: 12px 14px;
        border-top: 1px solid var(--demo-row-border);
      }

      .album-row:first-child {
        border-top: 0;
      }

      .album-row:focus {
        outline: 2px solid var(--demo-focus);
        outline-offset: -2px;
      }

      .album-mark {
        display: grid;
        place-items: center;
        width: 38px;
        height: 38px;
        color: white;
        background: var(--demo-accent);
        border-radius: 7px;
        font-weight: 800;
      }

      .album-row:nth-child(3n + 2) .album-mark {
        background: var(--demo-steel);
      }

      .album-row:nth-child(3n) .album-mark {
        background: var(--demo-gold);
      }

      .album-title {
        display: block;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-weight: 700;
      }

      .album-meta {
        display: block;
        color: var(--demo-muted);
        font-size: 13px;
      }

      .album-actions {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        color: var(--demo-muted);
      }

      .album-action-button {
        height: 30px;
        padding: 0 10px;
        color: var(--demo-text);
        background: transparent;
        border: 1px solid var(--demo-border);
        border-radius: 6px;
        font: inherit;
      }

      .album-action-button:hover,
      .album-action-button:focus {
        border-color: var(--demo-focus);
        outline: none;
      }

      .trash-icon {
        display: inline-flex;
        color: var(--demo-accent);
      }

      .trash-icon svg,
      .menu-svg {
        width: 16px;
        height: 16px;
        stroke: currentColor;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
        fill: none;
      }

      .page-context-menu [data-popright-icon] {
        color: var(--demo-accent);
        font-size: 18px;
        font-weight: 800;
      }

      .log {
        margin-top: 16px;
        min-height: 24px;
        color: var(--demo-muted);
      }
    </style>
  </head>
  <body>
    <main>
      <div class="toolbar">
        <div>
          <h1>Metallica Right-Click Jukebox</h1>
          <p class="eyebrow">Right-click an album or click Actions. Pick a track. Popright sends you to YouTube.</p>
        </div>
        <div class="theme-toggle" aria-label="Theme">
          <button type="button" data-theme-value="automatic" aria-pressed="true">Auto</button>
          <button type="button" data-theme-value="light" aria-pressed="false">Light</button>
          <button type="button" data-theme-value="dark" aria-pressed="false">Dark</button>
        </div>
      </div>
      <div class="album-list" id="albums"></div>
      <p class="log" id="log">Right-click an album or click Actions to choose one of its top tracks.</p>
    </main>
    <script type="module">
      import { contextMenuTheme, createContextMenu, createDropdownMenu } from "../../packages/core/dist/index.js";
      window.__poprightCreateDropdownMenu = createDropdownMenu;

      const albums = [
        { id: "kill", year: "1983", title: "Kill 'Em All", songs: ["Seek & Destroy", "The Four Horsemen", "Whiplash"] },
        { id: "ride", year: "1984", title: "Ride the Lightning", songs: ["For Whom the Bell Tolls", "Fade to Black", "Creeping Death"] },
        { id: "master", year: "1986", title: "Master of Puppets", songs: ["Master of Puppets", "Battery", "Welcome Home (Sanitarium)"] },
        { id: "justice", year: "1988", title: "...And Justice for All", songs: ["One", "Blackened", "Harvester of Sorrow"] },
        { id: "black", year: "1991", title: "Metallica", songs: ["Enter Sandman", "Nothing Else Matters", "Sad but True"] },
        { id: "load", year: "1996", title: "Load", songs: ["Until It Sleeps", "King Nothing", "Hero of the Day"] },
        { id: "reload", year: "1997", title: "Reload", songs: ["Fuel", "The Memory Remains", "The Unforgiven II"] },
        { id: "st-anger", year: "2003", title: "St. Anger", trash: true, songs: ["Frantic", "St. Anger", "Some Kind of Monster"] },
        { id: "magnetic", year: "2008", title: "Death Magnetic", songs: ["The Day That Never Comes", "All Nightmare Long", "Cyanide"] },
        { id: "hardwired", year: "2016", title: "Hardwired... to Self-Destruct", songs: ["Hardwired", "Moth Into Flame", "Spit Out the Bone"] },
        { id: "seasons", year: "2023", title: "72 Seasons", songs: ["Lux Aeterna", "72 Seasons", "If Darkness Had a Son"] }
      ];

      const albumList = document.querySelector("#albums");
      const log = document.querySelector("#log");
      const themeButtons = document.querySelectorAll("[data-theme-value]");

      function trashIcon() {
        return `
          <span class="trash-icon" title="This one knows what it did" aria-label="Trash">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M3 6h18"></path>
              <path d="M8 6V4h8v2"></path>
              <path d="M19 6l-1 14H6L5 6"></path>
              <path d="M10 11v5"></path>
              <path d="M14 11v5"></path>
            </svg>
          </span>
        `;
      }

      function playIcon() {
        const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
        svg.setAttribute("class", "menu-svg");
        svg.setAttribute("viewBox", "0 0 24 24");
        const polygon = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
        polygon.setAttribute("points", "8 5 19 12 8 19 8 5");
        polygon.setAttribute("fill", "currentColor");
        svg.append(polygon);
        return svg;
      }

      function setThemeFromMenu(theme, event) {
        setTheme(theme);
        event.preventClose();
        log.textContent = `Theme set to ${theme}`;
      }

      albumList.innerHTML = albums.map((album) => `
        <div class="album-row" tabindex="0" data-album-id="${album.id}">
          <span class="album-mark">${album.year.slice(2)}</span>
          <span>
            <span class="album-title">${album.title}</span>
            <span class="album-meta">${album.year} · ${album.songs.length} menu tracks</span>
          </span>
          <span class="album-actions">
            ${album.trash ? trashIcon() : ""}
            <button class="album-action-button" type="button">Actions</button>
          </span>
        </div>
      `).join("");

      function setTheme(theme) {
        document.documentElement.dataset.theme = theme;
        contextMenuTheme.set(theme);
        for (const button of themeButtons) {
          button.setAttribute("aria-pressed", String(button.dataset.themeValue === theme));
        }
      }

      for (const button of themeButtons) {
        button.addEventListener("click", () => setTheme(button.dataset.themeValue));
      }

      setTheme("automatic");

      const menuOptions = {
        items(context) {
          const row = context.triggerEvent.target.closest(".album-row");
          const album = albums.find((candidate) => candidate.id === row.dataset.albumId);
          const songItems = album.songs.map((song, index) => ({
              id: `${album.id}-${index}`,
              label: song,
              shortcut: `#${index + 1}`,
              icon: playIcon,
              value: { album, song, action: "play" }
          }));

          return [
            { type: "header", label: album.title, align: "items" },
            { type: "separator" },
            ...songItems,
            { type: "separator" },
            {
              type: "submenu",
              id: `${album.id}-more`,
              label: "More Info",
              value: { album },
              items: [
                {
                  id: `${album.id}-search`,
                  label: "Search YouTube",
                  value: { album, action: "youtube" }
                },
                {
                  id: `${album.id}-album`,
                  label: "Album Details",
                  value: { album, action: "album" }
                },
                {
                  id: `${album.id}-lyrics`,
                  label: "Find Lyrics",
                  value: { album, action: "lyrics" }
                },
                {
                  id: `${album.id}-wikipedia`,
                  label: "Wikipedia",
                  value: { album, action: "wikipedia" }
                },
                {
                  id: `${album.id}-napster`,
                  label: "Listen on Napster",
                  disabled: true,
                  value: { album, action: "napster" }
                }
              ]
            }
          ];
        },
        minWidth: 260,
        onSelect({ item }) {
          const { album, song, action } = item.value;
          const query = encodeURIComponent(
            action === "album"
              ? `Metallica ${album.title} album`
              : action === "lyrics"
                ? `Metallica ${album.title} lyrics`
                : action === "wikipedia"
                  ? `Metallica ${album.title} Wikipedia`
                  : song
                    ? `Metallica ${song}`
                    : `Metallica ${album.title}`
          );
          log.textContent =
            action === "album"
              ? `Looking up ${album.title}`
              : action === "lyrics"
                ? `Finding lyrics for ${album.title}`
                : action === "wikipedia"
                  ? `Opening Wikipedia results for ${album.title}`
                  : `Opening ${song} from ${album.title}`;
          const url =
            action === "wikipedia"
              ? `https://en.wikipedia.org/w/index.php?search=${query}`
              : `https://www.youtube.com/results?search_query=${query}`;
          window.open(url, "_blank", "noopener,noreferrer");
        }
      };

      createContextMenu(document.querySelectorAll(".album-row"), menuOptions);
      createDropdownMenu(document.querySelectorAll(".album-action-button"), menuOptions);

      createContextMenu(document.body, {
        className: "page-context-menu",
        minWidth: 240,
        items: [
          { type: "header", label: "Page Menu" },
          {
            type: "submenu",
            id: "view-source",
            label: "View Source",
            items: [
              {
                id: "source-browser",
                label: "Browser",
                value: { action: "source-browser" }
              },
              {
                id: "source-github",
                label: "On GitHub",
                value: { action: "source-github" }
              }
            ]
          },
          { type: "separator" },
          {
            id: "theme-auto",
            label: "Auto",
            icon: "◐",
            value: { action: "theme", theme: "automatic" },
            onSelect(event) {
              setThemeFromMenu("automatic", event);
            }
          },
          {
            id: "theme-light",
            label: "Light",
            icon: "☼",
            value: { action: "theme", theme: "light" },
            onSelect(event) {
              setThemeFromMenu("light", event);
            }
          },
          {
            id: "theme-dark",
            label: "Dark",
            icon: "☾",
            value: { action: "theme", theme: "dark" },
            onSelect(event) {
              setThemeFromMenu("dark", event);
            }
          }
        ],
        onSelect({ item }) {
          const action = item.value?.action;
          if (action === "source-browser") {
            window.open(`view-source:${window.location.href}`, "_blank", "noopener,noreferrer");
            return;
          }
          if (action === "source-github") {
            window.open(
              "https://github.com/vincentlaucsb/popright/blob/main/examples/vanilla/index.html",
              "_blank",
              "noopener,noreferrer"
            );
          }
        }
      });
    </script>
  </body>
</html>
